name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write  # 用于 PyPI 发布

jobs:
  # ==========================================
  # 代码质量检查 (Lint & Type Check)
  # ==========================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff linter
        run: ruff check cae/ --output-format=github

      - name: Check code formatting
        run: ruff format --check cae/

  # ==========================================
  # 多版本 Python 测试
  # ==========================================
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./cae-cli
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ai,mesh,report]"

      - name: Run pytest with coverage
        working-directory: ./cae-cli
        run: |
          pytest tests/ -v --cov=cae --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./cae-cli/coverage.xml
          flags: unittests
          name: cae-cli

  # ==========================================
  # 构建检查 (Build Check)
  # ==========================================
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        working-directory: ./cae-cli
        run: |
          pip install build
          python -m build

      - name: Verify package
        working-directory: ./cae-cli
        run: |
          pip install dist/*.whl
          pip install -e ".[dev]"
          cae --version

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: cae-cli/dist/

  # ==========================================
  # 测试 pygccx 库
  # ==========================================
  test-pygccx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./pygccx-master/pygccx-master
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        working-directory: ./pygccx-master/pygccx-master
        run: pytest -v

  # ==========================================
  # 发布到 Test PyPI (仅在 tag 时)
  # ==========================================
  publish-test:
    needs: [lint, test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        working-directory: ./cae-cli
        run: |
          pip install build
          python -m build

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/

  # ==========================================
  # 发布到 PyPI (仅在正式 tag 时)
  # ==========================================
  publish:
    needs: [lint, test, build]
    if: startsWith(github.ref, 'refs/tags/release/v')
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        working-directory: ./cae-cli
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  # ==========================================
  # 创建 GitHub Release
  # ==========================================
  release:
    needs: [publish]
    if: startsWith(github.ref, 'refs/tags/release/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}