<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Animated gradient background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a">
        <animate attributeName="stop-color" values="#0f172a;#1a1a2e;#0f172a" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#1e293b">
        <animate attributeName="stop-color" values="#1e293b;#16213e;#1e293b" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0f172a">
        <animate attributeName="stop-color" values="#0f172a;#1a1a2e;#0f172a" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Glowing orb gradient -->
    <radialGradient id="orbGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0"/>
    </radialGradient>

    <!-- Gold accent gradient -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>

    <!-- Mesh grid pattern -->
    <pattern id="gridPattern" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.15"/>
    </pattern>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong glow for icons -->
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text shadow -->
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes dash {
      to { stroke-dashoffset: -20; }
    }
    .float { animation: float 4s ease-in-out infinite; }
    .pulse { animation: pulse 3s ease-in-out infinite; }
    .shimmer-text {
      background: linear-gradient(90deg, #fbbf24, #fff, #fbbf24);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }
    .rotating {
      animation: rotate 20s linear infinite;
      transform-origin: center;
    }
    .particle {
      animation: float 3s ease-in-out infinite;
    }
  </style>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bgGradient)"/>

  <!-- Grid overlay -->
  <rect width="1200" height="320" fill="url(#gridPattern)"/>

  <!-- Animated background orbs -->
  <g opacity="0.3">
    <circle cx="200" cy="160" r="120" fill="url(#orbGradient)" class="pulse">
      <animate attributeName="r" values="120;140;120" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="80" r="80" fill="url(#orbGradient)">
      <animate attributeName="r" values="80;100;80" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="250" r="60" fill="url(#orbGradient)">
      <animate attributeName="r" values="60;75;60" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Floating particles -->
  <g class="particle" opacity="0.6">
    <circle cx="150" cy="60" r="3" fill="#fbbf24"/>
    <circle cx="300" cy="100" r="2" fill="#3b82f6"/>
    <circle cx="450" cy="50" r="2.5" fill="#93c5fd"/>
    <circle cx="750" cy="280" r="3" fill="#fbbf24"/>
    <circle cx="850" cy="40" r="2" fill="#3b82f6"/>
    <circle cx="1000" cy="200" r="2.5" fill="#93c5fd"/>
    <circle cx="1100" cy="100" r="2" fill="#fbbf24"/>
    <circle cx="50" cy="200" r="2" fill="#93c5fd"/>
  </g>

  <!-- Left: 3D Cube with glow -->
  <g transform="translate(100, 80)" class="float">
    <!-- Outer glow -->
    <ellipse cx="100" cy="160" rx="80" ry="20" fill="#3b82f6" opacity="0.2" filter="url(#glow)"/>

    <!-- Cube shadow -->
    <ellipse cx="100" cy="170" rx="60" ry="15" fill="#000" opacity="0.3"/>

    <!-- Main cube group -->
    <g filter="url(#strongGlow)">
      <!-- Bottom face -->
      <path d="M 100 140 L 200 90 L 200 150 L 100 200 Z" fill="#1e40af" opacity="0.9"/>
      <!-- Front face -->
      <path d="M 100 60 L 200 110 L 200 150 L 100 120 Z" fill="#2563eb" opacity="0.95"/>
      <!-- Left face -->
      <path d="M 100 60 L 140 40 L 140 100 L 100 120 Z" fill="#1d4ed8" opacity="0.9"/>
      <!-- Top face -->
      <path d="M 100 60 L 200 110 L 140 40 L 40 0 Z" fill="#3b82f6" opacity="0.8"/>
    </g>

    <!-- Stress cloud overlay -->
    <g opacity="0.7" class="pulse">
      <ellipse cx="150" cy="100" rx="35" ry="30" fill="#ef4444" opacity="0.3"/>
      <ellipse cx="150" cy="100" rx="25" ry="20" fill="#f59e0b" opacity="0.4"/>
      <ellipse cx="150" cy="100" rx="15" ry="12" fill="#22c55e" opacity="0.5"/>
    </g>

    <!-- Grid lines on cube -->
    <g stroke="#93c5fd" stroke-width="1" opacity="0.5" stroke-dasharray="4,2">
      <line x1="40" y1="20" x2="180" y2="160"/>
      <line x1="60" y1="10" x2="200" y2="130"/>
      <line x1="100" y1="0" x2="200" y2="100"/>
      <line x1="140" y1="-10" x2="200" y2="70"/>
    </g>

    <!-- Corner highlights -->
    <g fill="#fbbf24" filter="url(#glow)">
      <circle cx="100" cy="60" r="6">
        <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="200" cy="110" r="6">
        <animate attributeName="opacity" values="1;0.8;1" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="140" cy="40" r="5">
        <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="100" cy="120" r="5">
        <animate attributeName="opacity" values="1;0.9;1" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- Center: Text content -->
  <g transform="translate(360, 95)" filter="url(#textShadow)">
    <!-- Main title with shimmer -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#ffffff">
      cae<tspan class="shimmer-text">-cli</tspan>
    </text>

    <!-- Subtitle -->
    <text x="0" y="55" font-family="Arial, sans-serif" font-size="26" fill="#93c5fd" font-weight="400">
      Open Source CAE &amp; AI Assistant
    </text>

    <!-- Feature tags with icons -->
    <g font-family="Arial, sans-serif" font-size="18" fill="#e2e8f0" font-weight="500">
      <text x="0" y="100">
        <tspan fill="#fbbf24">⚡</tspan> Fast
        <tspan dx="15" fill="#3b82f6">🤖</tspan> AI-Assisted
        <tspan dx="15" fill="#22c55e">💻</tspan> Local
        <tspan dx="15" fill="#a855f7">🔒</tspan> Private
      </text>
    </g>

    <!-- Tagline -->
    <text x="0" y="140" font-family="Arial, sans-serif" font-size="15" fill="#64748b">
      Lightweight FEA Powered by CalculiX
    </text>
  </g>

  <!-- Right: Decorative rotating rings -->
  <g transform="translate(1050, 160)" class="rotating" opacity="0.4">
    <circle cx="0" cy="0" r="70" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="8,4"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#93c5fd" stroke-width="1" stroke-dasharray="4,4"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  </g>

  <!-- Additional decorative elements -->
  <g transform="translate(1080, 60)" opacity="0.3">
    <g stroke="#fbbf24" stroke-width="1.5" fill="none">
      <path d="M 0 30 L 30 0 L 60 30 L 30 60 Z"/>
      <circle cx="30" cy="30" r="10"/>
    </g>
  </g>

  <!-- Bottom accent bar with glow -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="1100" height="4" rx="2" fill="url(#goldGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Version badge -->
  <g transform="translate(1050, 280)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="#3b82f6" opacity="0.9"/>
    <text x="50" y="19" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">v1.5.0</text>
  </g>
</svg>
