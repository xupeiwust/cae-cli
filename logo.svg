<svg width="1200" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变背景 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="gridGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="300" fill="url(#bgGradient)"/>

  <!-- 网格背景装饰 -->
  <g opacity="0.1">
    <rect width="1200" height="300" fill="url(#gridGradient)"/>
    <line x1="150" y1="0" x2="150" y2="300" stroke="#93c5fd"/>
    <line x1="300" y1="0" x2="300" y2="300" stroke="#93c5fd"/>
    <line x1="450" y1="0" x2="450" y2="300" stroke="#93c5fd"/>
    <line x1="600" y1="0" x2="600" y2="300" stroke="#93c5fd"/>
    <line x1="750" y1="0" x2="750" y2="300" stroke="#93c5fd"/>
    <line x1="900" y1="0" x2="900" y2="300" stroke="#93c5fd"/>
    <line x1="1050" y1="0" x2="1050" y2="300" stroke="#93c5fd"/>

    <line x1="0" y1="50" x2="1200" y2="50" stroke="#93c5fd"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#93c5fd"/>
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#93c5fd"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#93c5fd"/>
    <line x1="0" y1="250" x2="1200" y2="250" stroke="#93c5fd"/>
  </g>

  <!-- 左侧徽标区域 -->
  <g transform="translate(100, 75)">
    <!-- 网格立方体 -->
    <g>
      <!-- 底面 -->
      <path d="M 80 100 L 180 50 L 180 130 L 80 180 Z" fill="#1e40af" opacity="0.8"/>
      <!-- 前面 -->
      <path d="M 80 20 L 180 70 L 180 130 L 80 100 Z" fill="#3b82f6" opacity="0.9"/>
      <!-- 左侧面 -->
      <path d="M 80 20 L 120 0 L 120 80 L 80 100 Z" fill="#2563eb" opacity="0.9"/>
      <!-- 顶面 -->
      <path d="M 80 20 L 180 70 L 120 0 L 20 -50 Z" fill="#1d4ed8" opacity="0.7"/>
      <!-- 顶点 -->
      <circle cx="80" cy="20" r="8" fill="#fbbf24" opacity="0.9"/>
      <circle cx="180" cy="70" r="8" fill="#fbbf24" opacity="0.9"/>
      <circle cx="120" cy="0" r="8" fill="#fbbf24" opacity="0.9"/>
    </g>

    <!-- 应力云图 -->
    <circle cx="130" cy="90" r="40" fill="none" stroke="#fbbf24" stroke-width="3" opacity="0.5"/>
    <g opacity="0.6">
      <path d="M 110 85 L 150 95 L 150 115 L 110 105 Z" fill="#ef4444"/>
      <path d="M 115 90 L 145 100 L 145 110 L 115 100 Z" fill="#f59e0b"/>
      <path d="M 120 95 L 140 102 L 140 108 L 120 101 Z" fill="#22c55e"/>
    </g>

    <!-- 网格线 -->
    <g stroke="#93c5fd" stroke-width="1.5" opacity="0.4">
      <line x1="40" y1="40" x2="180" y2="180"/>
      <line x1="60" y1="40" x2="180" y2="160"/>
      <line x1="80" y1="40" x2="180" y2="140"/>
      <line x1="100" y1="40" x2="180" y2="120"/>
      <line x1="120" y1="40" x2="180" y2="100"/>
      <line x1="140" y1="40" x2="180" y2="80"/>
      <line x1="160" y1="40" x2="180" y2="60"/>

      <line x1="40" y1="60" x2="160" y2="180"/>
      <line x1="40" y1="80" x2="140" y2="180"/>
      <line x1="40" y1="100" x2="120" y2="180"/>
      <line x1="40" y1="120" x2="100" y2="180"/>
      <line x1="40" y1="140" x2="80" y2="180"/>
      <line x1="40" y1="160" x2="60" y2="180"/>
    </g>
  </g>

  <!-- 中间文字区域 -->
  <g transform="translate(320, 90)">
    <!-- 主标题 -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff">
      cae
      <tspan fill="#fbbf24">-cli</tspan>
    </text>

    <!-- 副标题 -->
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="28" fill="#93c5fd" font-weight="500">
      Open Source CAE &amp; AI Assistant
    </text>

    <!-- 特性标签 -->
    <g font-family="Arial, sans-serif" font-size="18" fill="#cbd5e1">
      <text x="0" y="100" font-weight="bold">
        ⚡ Fast • 🤖 AI-Assisted • 💻 Local • 🔒 Private
      </text>
    </g>

    <!-- 底部标语 -->
    <text x="0" y="135" font-family="Arial, sans-serif" font-size="16" fill="#64748b" opacity="0.9">
      Lightweight FEA Powered by CalculiX for Engineering Students and Small Labs
    </text>
  </g>

  <!-- 右侧装饰元素 -->
  <g transform="translate(1050, 150)" opacity="0.15">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#93c5fd" stroke-width="3"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#93c5fd" stroke-width="2"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#93c5fd" stroke-width="1"/>

    <g stroke="#fbbf24" stroke-width="2">
      <line x1="-30" y1="-30" x2="30" y2="30"/>
      <line x1="-30" y1="30" x2="30" y2="-30"/>
      <line x1="-30" y1="0" x2="30" y2="0"/>
      <line x1="0" y1="-30" x2="0" y2="30"/>
    </g>
  </g>

  <!-- 底部装饰条 -->
  <rect x="50" y="270" width="1100" height="3" rx="1.5" fill="#fbbf24"/>
</svg>
